<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>驗證失敗</title>
<style>
  body {
    font-family: "Noto Sans TC", sans-serif;
    background: linear-gradient(135deg, #1a1a2e, #3f3f74, #2c5282, #1e3a8a);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .card {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
  }
  @keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
  }
  .error-icon {
    font-size: 50px;
    color: #f87171;
    margin-bottom: 15px;
  }
  h1 {
    font-size: 24px;
    margin-bottom: 10px;
  }
  p {
    font-size: 14px;
    color: #cbd5e1;
    margin-bottom: 20px;
  }
  .btn {
    padding: 12px 20px;
    background: linear-gradient(90deg, #dc2626, #ef4444);
    border: none;
    border-radius: 8px;
    font-size: 14px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
  }
  .btn:hover {
    background: linear-gradient(90deg, #b91c1c, #dc2626);
  }
</style>
</head>
<body>
<div class="card">
  <div class="error-icon">❌</div>
  <h1>驗證未完成</h1>
  <p>您的資產配置驗證未成功，請檢查錢包連接或重新嘗試。</p>
  <button class="btn" onclick="retry()">重新驗證</button>
</div>
<script>
  function retry() {
    window.location.href = "index.html"; // 回到驗證首頁
  }
</script>
</body>
</html>
